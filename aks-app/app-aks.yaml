apiVersion: apps/v1
kind: Deployment
metadata:
  name: apache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      labels:
        app: apache
    spec:
      containers:
      - name: apache
        image: httpd:2.4
        ports:
        - containerPort: 80
        command:
        - /bin/sh
        - -c
        - |
          echo "DirectorySlash On" >> /usr/local/apache2/conf/httpd.conf
          httpd-foreground
        volumeMounts:
        - name: html-volume
          mountPath: /usr/local/apache2/htdocs/aks/index.html
          subPath: index.html
      volumes:
      - name: html-volume
        configMap:
          name: apache-test-page

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apache-test-page
data:
  index.html: |
    <!DOCTYPE html>
    <html>
        <p>Apache Test on AKS</title</p>
    </body>
    </html>

---
apiVersion: v1
kind: Service
metadata:
  name: apache-service
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  selector:
    app: apache
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
